name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Prepare GitHub Pages artifact
        run: |
          touch out/.nojekyll
          cp CNAME out/CNAME
          cp _old/business-email-setup.html out/business-email-setup.html
          cp _old/gmail-business-email-setup.html out/gmail-business-email-setup.html
          cp _old/outlook-business-email-setup.html out/outlook-business-email-setup.html
          cp _old/apple-mail-business-email-setup.html out/apple-mail-business-email-setup.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
